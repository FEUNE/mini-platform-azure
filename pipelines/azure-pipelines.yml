trigger:
  branches:
    include:
      - main
  paths:
    exclude:
      - docs/*
      - README.md

pool:
  name: 'Default'

variables:
  - group: miniplatform-dev-secrets
  - name: ACR_LOGIN_SERVER
    value: 'miniplatformdevacr.azurecr.io'
  - name: IMAGE_NAME
    value: 'mini-platform-api'
  - name: IMAGE_TAG
    value: '$(Build.BuildId)'
  - name: AZURE_SERVICE_CONNECTION
    value: 'azure-miniplatform-dev'
  - name: RESOURCE_GROUP
    value: 'miniplatform-dev-rg'

stages:

# ─────────────────────────────────────────
# STAGE 1 — CI : Build + Scan + Push
# ─────────────────────────────────────────
- stage: CI
  displayName: 'Build & Push Docker Image'
  jobs:
  - job: Build
    displayName: 'Build, Scan and Push'
    timeoutInMinutes: 30
    cancelTimeoutInMinutes: 5
    steps:

    - checkout: self
      fetchDepth: 1

    - task: NodeTool@0
      inputs:
        versionSpec: '24.x'
      displayName: 'Install Node.js'

    - script: |
        cd app-example/api
        npm ci --omit=dev
        npm audit --audit-level=high
      displayName: 'Install dependencies + audit'

    - task: Docker@2
      displayName: 'Login to ACR'
      inputs:
        command: login
        containerRegistry: 'miniplatform-acr'

    - task: Docker@2
      displayName: 'Build Docker image'
      inputs:
        command: build
        containerRegistry: 'miniplatform-acr'
        repository: '$(IMAGE_NAME)'
        dockerfile: 'app-example/api/Dockerfile'
        buildContext: 'app-example/api'
        tags: |
          $(IMAGE_TAG)
          latest
        arguments: '--no-cache'

    - task: Docker@2
      displayName: 'Push image to ACR'
      inputs:
        command: push
        containerRegistry: 'miniplatform-acr'
        repository: '$(IMAGE_NAME)'
        tags: |
          $(IMAGE_TAG)
          latest

    - task: Docker@2
      displayName: 'Logout from ACR'
      inputs:
        command: logout
        containerRegistry: 'miniplatform-acr'
      condition: always()

# ─────────────────────────────────────────
# STAGE 2 — CD : Deploy infra + app
# ─────────────────────────────────────────
- stage: CD
  displayName: 'Deploy to Azure'
  dependsOn: CI
  condition: succeeded()
  jobs:
  - job: Deploy
    displayName: 'Deploy Infrastructure and App'
    timeoutInMinutes: 30
    cancelTimeoutInMinutes: 5
    steps:

    - checkout: self
      fetchDepth: 1

    - task: AzureCLI@2
      displayName: 'Validate Bicep template'
      inputs:
        azureSubscription: '$(AZURE_SERVICE_CONNECTION)'
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        inlineScript: |
          az deployment group validate \
            --resource-group $(RESOURCE_GROUP) \
            --template-file bicep/main.bicep \
            --parameters \
              env=dev \
              location=swedencentral \
              projectName=miniplatform \
              dbAdminUser=$(DB_USER) \
              dbAdminPassword=$(DB_PASSWORD)

    - task: AzureCLI@2
      displayName: 'Deploy Bicep infrastructure'
      inputs:
        azureSubscription: '$(AZURE_SERVICE_CONNECTION)'
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        inlineScript: |
          az deployment group create \
            --resource-group $(RESOURCE_GROUP) \
            --template-file bicep/main.bicep \
            --parameters \
              env=dev \
              location=swedencentral \
              projectName=miniplatform \
              dbAdminUser=$(DB_USER) \
              dbAdminPassword=$(DB_PASSWORD)

    - script: |
        echo "Infrastructure deployed successfully"
        echo "Image: $(ACR_LOGIN_SERVER)/$(IMAGE_NAME):$(IMAGE_TAG)"
      displayName: 'Deployment summary'